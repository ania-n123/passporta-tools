<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Kalkulator Zwrotów — Passporta</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; color: #222; }
  .header { background: #e85d04; color: white; padding: 20px 32px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
  .header h1 { font-size: 22px; font-weight: 600; }
  .header p { font-size: 13px; opacity: 0.85; margin-top: 4px; }
  .rate-bar { background: #1a1a2e; color: #fff; text-align: center; padding: 10px 16px; font-size: 14px; }
  .rate-bar .rate-val { font-size: 20px; font-weight: 700; color: #ffd700; }
  .rate-bar .rate-date { font-size: 12px; opacity: 0.7; margin-left: 10px; }
  .container { max-width: 700px; margin: 32px auto; padding: 0 16px; }
  .card { background: white; border-radius: 10px; padding: 28px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
  .card h2 { font-size: 15px; font-weight: 600; color: #e85d04; margin-bottom: 18px; text-transform: uppercase; letter-spacing: 0.5px; }
  label { display: block; font-size: 13px; font-weight: 500; color: #555; margin-bottom: 5px; margin-top: 14px; }
  label:first-child { margin-top: 0; }
  input[type=text], input[type=number], select {
    width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px;
    font-size: 14px; color: #222; background: #fafafa;
  }
  input:focus, select:focus { outline: none; border-color: #e85d04; background: white; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .scenario-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 4px; }
  .scenario-btn {
    padding: 12px 10px; border: 2px solid #ddd; border-radius: 8px; cursor: pointer;
    background: white; font-size: 13px; text-align: left; transition: all 0.15s;
  }
  .scenario-btn:hover { border-color: #e85d04; background: #fff5f0; }
  .scenario-btn.active { border-color: #e85d04; background: #fff5f0; }
  .scenario-btn .icon { font-size: 18px; display: block; margin-bottom: 4px; }
  .scenario-btn .title { font-weight: 600; font-size: 13px; }
  .scenario-btn .desc { font-size: 11px; color: #888; margin-top: 2px; }
  .btn-calc {
    width: 100%; padding: 14px; background: #e85d04; color: white; border: none;
    border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 20px;
  }
  .btn-calc:hover { background: #c44d00; }
  .result { display: none; }
  .result-box { border-radius: 8px; padding: 20px; margin-bottom: 12px; }
  .result-box.green { background: #e8f5e9; border-left: 4px solid #43a047; }
  .result-box.red { background: #fce4ec; border-left: 4px solid #e53935; }
  .result-box.orange { background: #fff3e0; border-left: 4px solid #fb8c00; }
  .result-box .label { font-size: 12px; color: #666; margin-bottom: 4px; }
  .result-box .amount { font-size: 28px; font-weight: 700; }
  .result-box .amount-usd { font-size: 16px; font-weight: 500; opacity: 0.7; margin-top: 3px; }
  .result-box.green .amount { color: #2e7d32; }
  .result-box.red .amount { color: #c62828; }
  .result-box.orange .amount { color: #e65100; }
  .breakdown { background: #f8f8f8; border-radius: 8px; padding: 16px; }
  .breakdown table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .breakdown tr td { padding: 6px 0; }
  .breakdown tr td:nth-child(2) { text-align: right; font-weight: 500; color: #333; }
  .breakdown tr td:nth-child(3) { text-align: right; font-weight: 500; color: #888; padding-left: 12px; }
  .breakdown thead td { font-size: 11px; color: #aaa; padding-bottom: 4px; }
  .breakdown tr.total td { border-top: 1px solid #ddd; padding-top: 10px; font-weight: 700; font-size: 14px; }
  .note { font-size: 12px; color: #888; margin-top: 12px; font-style: italic; }
  .reset-btn { background: none; border: none; color: #e85d04; font-size: 13px; cursor: pointer; margin-top: 10px; text-decoration: underline; }
  .rate-loading { color: #aaa; font-size: 12px; }
  .cur-btn { border: 1px solid #e85d04; background: none; color: #e85d04; padding: 2px 9px; border-radius: 4px; cursor: pointer; font-size: 12px; }
  .cur-btn.active { background: #e85d04; color: white; }
  .cur-btn + .cur-btn { margin-left: 4px; }
  .extra-product-row { display: grid; grid-template-columns: 1fr 120px 36px; gap: 10px; align-items: end; margin-bottom: 10px; }
  .extra-product-row label { margin-top: 0; }
  .btn-add-product { background: none; border: 1px dashed #e85d04; color: #e85d04; padding: 9px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; margin-top: 6px; width: 100%; }
  .btn-add-product:hover { background: #fff5f0; }
  .btn-remove-product { background: none; border: none; color: #bbb; font-size: 22px; cursor: pointer; padding: 0 4px; line-height: 1; padding-bottom: 10px; }
  .btn-remove-product:hover { color: #e53935; }
</style>
</head>

<div class="header">
  <div>
    <h1>Kalkulator Zwrotów</h1>
    <p>Passporta — narzędzie wewnętrzne dla pracowników</p>
  </div>
</div>
<div class="rate-bar" id="rateBadge">
  <div class="rate-loading">Pobieranie kursu USD...</div>
</div>

<div class="container">

  <div class="card">
    <h2>1. Dane zamówienia</h2>

    <label>Rodzaj wizy</label>
    <input type="text" id="visaSearch" placeholder="Wpisz nazwę wizy lub kraj..." oninput="filterVisa()" autocomplete="off">
    <select id="visaSelect" size="1" onchange="onVisaSelect()" style="margin-top:6px; display:none; max-height:200px;"></select>

    <div class="row2">
      <div>
        <label>Cena całkowita zapłacona przez klienta (EUR) <span style="font-weight:400;color:#aaa">— auto z listy</span></label>
        <input type="number" id="totalPrice" placeholder="np. 199.00" step="0.01" min="0" oninput="clearResult()">
      </div>
      <div>
        <label>Government Fee (EUR) <span style="font-weight:400;color:#aaa">— auto z listy</span></label>
        <input type="number" id="govtFee" placeholder="np. 100.00" step="0.01" min="0" oninput="clearResult()">
      </div>
    </div>
  </div>

  <div class="card" style="padding-bottom: 20px;">
    <h2>Dodatkowe produkty w zamówieniu</h2>
    <div id="extraRows"></div>
    <button class="btn-add-product" onclick="addExtraProduct()">+ Dodaj produkt</button>
  </div>

  <button class="btn-calc" onclick="calculate()">Oblicz zwrot częściowy</button>

  <div class="card result" id="result" style="margin-top:20px;">
    <h2>Wynik <span style="float:right;font-size:12px;font-weight:400;text-transform:none;letter-spacing:0;">Waluta: <button onclick="setDisplayCurrency('EUR')" id="cur-eur" class="cur-btn active">EUR</button><button onclick="setDisplayCurrency('USD')" id="cur-usd" class="cur-btn">USD</button></span></h2>
    <div id="result-content"></div>
    <button class="reset-btn" onclick="resetAll()">↺ Nowe obliczenie</button>
  </div>

</div>

let selectedScenario = 'partial';
let displayCurrency = 'EUR';

function setDisplayCurrency(cur) {
  displayCurrency = cur;
  document.getElementById('cur-eur').classList.toggle('active', cur === 'EUR');
  document.getElementById('cur-usd').classList.toggle('active', cur === 'USD');
  if (document.getElementById('result').style.display !== 'none') calculate();
}
let filtered = [];
let eurUsdRate = null;
let rateDate = null;

// Pobierz kurs EUR/USD przy ładowaniu
async function fetchRate() {
  try {
    const res = await fetch('https://api.frankfurter.app/latest?from=EUR&to=USD');
    const data = await res.json();
    eurUsdRate = data.rates.USD;
    rateDate = data.date;
    document.getElementById('rateBadge').innerHTML = `Kurs USD z dnia ${rateDate}: <span class="rate-val">1 EUR = ${eurUsdRate.toFixed(4)} USD</span><span class="rate-date">(źródło: frankfurter.app)</span>`;
  } catch(e) {
    eurUsdRate = 1.17; // fallback
    document.getElementById('rateBadge').innerHTML = `Kurs USD (offline): <span class="rate-val">1 EUR ≈ ${eurUsdRate.toFixed(2)} USD</span>`;
  }
}

fetchRate();

function toUSD(eur) {
  if (!eurUsdRate) return null;
  return Math.round(eur * eurUsdRate);
}

function fmtEUR(n) { return n.toFixed(2).replace('.', ',') + ' EUR'; }
function fmtUSD(n) {
  if (n === null) return '—';
  return Math.round(n) + ' USD';
}

function filterVisa() {
  const q = document.getElementById('visaSearch').value.toLowerCase();
  const sel = document.getElementById('visaSelect');
  if (q.length < 2) { sel.style.display = 'none'; return; }
  filtered = VISA_DATA.filter(v => v.name.toLowerCase().includes(q));
  sel.innerHTML = filtered.map((v,i) => `<option value="${i}">${v.name}${v.price ? ' — cena: '+v.price+' EUR' : ''} (govt: ${v.govt} EUR)</option>`).join('');
  sel.style.display = filtered.length ? 'block' : 'none';
  clearResult();
}

function onVisaSelect() {
  const sel = document.getElementById('visaSelect');
  if (sel.selectedIndex < 0) return;
  const idx = parseInt(sel.value);
  const visa = filtered[idx];
  document.getElementById('visaSearch').value = visa.name;
  document.getElementById('govtFee').value = visa.govt;
  if (visa.price) document.getElementById('totalPrice').value = visa.price;
  sel.style.display = 'none';
  clearResult();
}

function setScenario(s) {
  selectedScenario = s;
  ['full','partial','none_submitted','none_rush'].forEach(k => {
    document.getElementById('btn-'+k).classList.toggle('active', k === s);
  });
  clearResult();
}

function addExtraProduct() {
  const container = document.getElementById('extraRows');
  const row = document.createElement('div');
  row.className = 'extra-product-row';
  row.innerHTML = `
    <div>
      <label>Nazwa produktu</label>
      <input type="text" placeholder="np. Express Processing" oninput="clearResult()">
    </div>
    <div>
      <label>Cena (EUR)</label>
      <input type="number" placeholder="20" step="0.01" min="0" oninput="clearResult()">
    </div>
    <button class="btn-remove-product" onclick="this.closest('.extra-product-row').remove(); clearResult();" title="Usuń">×</button>
  `;
  container.appendChild(row);
  clearResult();
}

function getExtraProducts() {
  const rows = document.querySelectorAll('.extra-product-row');
  const products = [];
  rows.forEach(row => {
    const inputs = row.querySelectorAll('input');
    const name = inputs[0].value.trim() || 'Dodatkowy produkt';
    const price = parseFloat(inputs[1].value) || 0;
    if (price > 0) products.push({name, price});
  });
  return products;
}

function calculate() {
  const total = parseFloat(document.getElementById('totalPrice').value);
  const govt  = parseFloat(document.getElementById('govtFee').value);

  if (isNaN(total) || total <= 0) { alert('Podaj cenę całkowitą.'); return; }
  if (isNaN(govt) || govt < 0)   { alert('Podaj government fee (może być 0).'); return; }
  if (govt > total)               { alert('Government fee nie może być wyższy niż cena całkowita.'); return; }

  const extras = getExtraProducts();
  const extrasTotal = Math.round(extras.reduce((s, p) => s + p.price, 0) * 100) / 100;
  const adjustedTotal = Math.round((total + extrasTotal) * 100) / 100;

  const commission = adjustedTotal - govt;
  let refund = 0, keep = 0, color = '', title = '', note = '';
  const breakdown = [];

  function addPriceRows() {
    if (extrasTotal > 0) {
      breakdown.push(['Cena wizy', fmtEUR(total), fmtUSD(toUSD(total))]);
      extras.forEach(p => breakdown.push([p.name, fmtEUR(p.price), fmtUSD(toUSD(p.price))]));
      breakdown.push(['Razem zapłacono', fmtEUR(adjustedTotal), fmtUSD(toUSD(adjustedTotal))]);
    } else {
      breakdown.push(['Cena całkowita', fmtEUR(adjustedTotal), fmtUSD(toUSD(adjustedTotal))]);
    }
  }

  if (selectedScenario === 'full') {
    refund = adjustedTotal; keep = 0; color = 'green';
    title = 'Pełny zwrot';
    note = 'Klient odstąpił w ciągu 14 dni, usługa nie została rozpoczęta.';
    addPriceRows();
    breakdown.push(
      ['Zwrot dla klienta', fmtEUR(refund), fmtUSD(toUSD(refund))],
      ['Zatrzymujemy', fmtEUR(keep), fmtUSD(toUSD(keep))]
    );
  } else if (selectedScenario === 'partial') {
    keep   = Math.round(commission * 0.5 * 100) / 100;
    refund = Math.round((adjustedTotal - keep) * 100) / 100;
    color  = 'orange'; title = 'Zwrot częściowy';
    note   = 'Usługa rozpoczęta — zatrzymujemy 50% prowizji.';
    addPriceRows();
    breakdown.push(
      ['Government fee', fmtEUR(govt), fmtUSD(toUSD(govt))],
      ['Prowizja Passporta', fmtEUR(commission), fmtUSD(toUSD(commission))],
      ['50% prowizji (zatrzymujemy)', fmtEUR(keep), fmtUSD(toUSD(keep))],
      ['Zwrot dla klienta', fmtEUR(refund), fmtUSD(toUSD(refund))]
    );
  } else if (selectedScenario === 'none_submitted') {
    refund = 0; keep = adjustedTotal; color = 'red';
    title = 'Brak zwrotu — wniosek złożony';
    note  = 'Wniosek wizowy został już złożony do organu. Zwrot nie przysługuje.';
    addPriceRows();
    breakdown.push(
      ['Zwrot dla klienta', fmtEUR(0), fmtUSD(0)],
      ['Zatrzymujemy', fmtEUR(keep), fmtUSD(toUSD(keep))]
    );
  } else if (selectedScenario === 'none_rush') {
    refund = 0; keep = adjustedTotal; color = 'red';
    title = 'Brak zwrotu — usługa Rush wykonana';
    note  = 'Klient złożył deklarację Rush i zrzekł się prawa do odstąpienia po wykonaniu usługi.';
    addPriceRows();
    breakdown.push(
      ['Zwrot dla klienta', fmtEUR(0), fmtUSD(0)],
      ['Zatrzymujemy', fmtEUR(keep), fmtUSD(toUSD(keep))]
    );
  }

  const amountEUR = refund > 0 ? refund : keep;
  const amountUSD = toUSD(amountEUR);
  const amountLabel = refund > 0 ? 'Kwota zwrotu dla klienta' : 'Kwota zatrzymana przez Passporta';

  const mainAmount = displayCurrency === 'USD' ? fmtUSD(amountUSD) : fmtEUR(amountEUR);
  const secAmount  = displayCurrency === 'USD' ? `≈ ${fmtEUR(amountEUR)}` : `≈ ${fmtUSD(amountUSD)}`;

  let html = `
    <div class="result-box ${color}">
      <div class="label">${title}</div>
      <div class="amount">${mainAmount}</div>
      <div class="amount-usd">${secAmount}</div>
      <div class="label" style="margin-top:6px">${amountLabel}</div>
    </div>
    <div class="breakdown">
      <table>
        <thead><tr><td></td><td>EUR</td><td>USD</td></tr></thead>
        ${breakdown.map((r,i) => `<tr class="${i===breakdown.length-1?'total':''}"><td>${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td></tr>`).join('')}
      </table>
    </div>
    <p class="note">${note}${rateDate ? ` Kurs: 1 EUR = ${eurUsdRate.toFixed(4)} USD (${rateDate}).` : ''}</p>
  `;

  const res = document.getElementById('result');
  document.getElementById('result-content').innerHTML = html;
  res.style.display = 'block';
  res.scrollIntoView({behavior:'smooth', block:'start'});
}

function clearResult() {
  document.getElementById('result').style.display = 'none';
}

function resetAll() {
  document.getElementById('visaSearch').value = '';
  document.getElementById('visaSelect').style.display = 'none';
  document.getElementById('totalPrice').value = '';
  document.getElementById('govtFee').value = '';
  document.getElementById('extraRows').innerHTML = '';
  selectedScenario = null;
  ['full','partial','none_submitted','none_rush'].forEach(k =>
    document.getElementById('btn-'+k).classList.remove('active'));
  clearResult();
  window.scrollTo({top:0,behavior:'smooth'});
}
